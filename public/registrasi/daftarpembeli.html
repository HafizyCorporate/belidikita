<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daftar Akun - Belidikita Spesial Ramadhan</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css?family=Montserrat:400,600,800');
        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #E1F5FE 0%, #81D4FA 100%); 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; 
            overflow: hidden; position: relative;
        }

        /* --- DEKORASI RAMADHAN --- */
        .ramadhan-decor { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .lantern {
            position: absolute; top: -10px; width: 45px; height: 65px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512"><path fill="%23FFD700" d="M112 0c-17.7 0-32 14.3-32 32v16h224V32c0-17.7-14.3-32-32-32H112zM0 96c0-17.7 14.3-32 32-32h320c17.7 0 32 14.3 32 32v64H0V96zm48 96h288v192c0 35.3-28.7 64-64 64H112c-35.3 0-64-28.7-64-64V192zm144 288c53 0 96 43 96 96H96c0-53 43-96 96-96z"/></svg>') no-repeat center center;
            transform-origin: top center; filter: drop-shadow(0px 5px 15px rgba(255, 215, 0, 0.6));
        }
        .lantern.left { left: 10%; animation: swing 3s ease-in-out infinite alternate; }
        .lantern.right { right: 10%; animation: swing 4s ease-in-out infinite alternate-reverse; width: 30px; height: 50px; }
        @keyframes swing { 0% { transform: rotate(10deg); } 100% { transform: rotate(-10deg); } }
        
        .moon-icon { position: absolute; top: 10vh; left: 5vw; font-size: 70px; color: rgba(255, 215, 0, 0.3); filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.8)); transform: scaleX(-1); animation: floatMoon 5s ease-in-out infinite alternate; z-index: 0; }
        @keyframes floatMoon { 0% { transform: scaleX(-1) translateY(0) rotate(-5deg); } 100% { transform: scaleX(-1) translateY(-15px) rotate(5deg); } }

        /* --- KARTU REGISTER (GLASSMORPHISM) --- */
        .auth-card { 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
            width: 90%; max-width: 400px; padding: 40px 25px; border-radius: 25px; 
            box-shadow: 0 20px 50px rgba(13, 71, 161, 0.15); text-align: center; 
            position: relative; z-index: 10; border: 2px solid #fff;
            animation: popCard 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popCard { 0% { transform: scale(0.8) translateY(30px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }

        .auth-icon { font-size: 35px; color: #00AA5B; margin-bottom: 10px; filter: drop-shadow(0 4px 10px rgba(0, 170, 91, 0.4)); animation: pulseIcon 2.5s infinite; }
        @keyframes pulseIcon { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        .back-btn { display: inline-flex; align-items: center; background: #E1F5FE; padding: 6px 12px; border-radius: 20px; color: #0D47A1; text-decoration: none; font-size: 11px; font-weight: 800; position: absolute; top: 20px; left: 20px; transition: 0.2s; }
        .back-btn:hover { background: #0D47A1; color: #fff; transform: translateX(-3px); }
        .back-btn i { margin-right: 5px; }

        .auth-title { font-size: 22px; font-weight: 800; color: #0D47A1; margin-bottom: 5px; margin-top: 10px; text-shadow: 1px 1px 2px rgba(0,0,0,0.05); }
        .auth-subtitle { font-size: 12px; color: #666; margin-bottom: 25px; font-weight: 600; }
        
        .input-group { margin-bottom: 15px; text-align: left; position: relative; }
        .input-group label { display: block; font-size: 11px; font-weight: 800; color: #0D47A1; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-group input { 
            width: 100%; padding: 12px 15px; border: 2px solid #E1F5FE; border-radius: 12px; outline: none; 
            font-size: 13px; font-weight: 600; background: #fbfdff; transition: all 0.3s ease; color: #333;
        }
        .input-group input:focus { border-color: #0D47A1; background: #fff; box-shadow: 0 5px 15px rgba(13, 71, 161, 0.1); transform: translateY(-2px); }
        
        .btn-auth { 
            width: 100%; padding: 15px; background: linear-gradient(135deg, #00AA5B, #00c853); 
            color: #fff; border: none; border-radius: 12px; font-size: 13px; font-weight: 800; 
            cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(0, 170, 91, 0.3); text-transform: uppercase; letter-spacing: 1px; margin-top: 5px;
        }
        .btn-auth:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(0, 170, 91, 0.4); }
        .btn-auth:active { transform: scale(0.95); }

        .toggle-text { margin-top: 20px; font-size: 12px; color: #666; font-weight: 600; }
        .toggle-text a { color: #00AA5B; font-weight: 800; text-decoration: none; background: #E8F5E9; padding: 4px 10px; border-radius: 12px; margin-left: 5px; transition: 0.2s; }
        .toggle-text a:hover { background: #00AA5B; color: #fff; }
        
        /* --- CSS NOTIFIKASI TOAST (MEMBAL/BOUNCY) --- */
        #customToast {
            visibility: hidden; min-width: 280px; margin-left: -140px;
            background: rgba(13, 71, 161, 0.95); backdrop-filter: blur(10px);
            color: #fff; text-align: center; border: 2px solid rgba(255,255,255,0.2);
            border-radius: 30px; padding: 16px 20px; position: fixed;
            z-index: 9999; left: 50%; bottom: -50px; 
            font-size: 13px; font-weight: 800; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: visibility 0.4s, opacity 0.4s, bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            opacity: 0;
        }
        #customToast.show { visibility: visible; opacity: 1; bottom: 40px; }
        #customToast.success { background: rgba(0, 170, 91, 0.95); border-color: #A5D6A7; }
        #customToast.error { background: rgba(255, 59, 48, 0.95); border-color: #FFCDD2; }
    </style>
</head>
<body>

    <div class="ramadhan-decor">
        <i class="fas fa-moon moon-icon"></i>
        <div class="lantern left"></div>
        <div class="lantern right"></div>
    </div>

    <div class="auth-card" id="registerSection">
        <a href="loginpembeli.html" class="back-btn"><i class="fas fa-arrow-left"></i> Login</a>
        
        <i class="fas fa-user-plus auth-icon"></i>
        <h1 class="auth-title">Gabung Sekarang</h1>
        <p class="auth-subtitle">Daftar untuk menikmati diskon Ramadhan</p>

        <form id="formRegister">
            <div class="input-group">
                <label>Nama Lengkap</label>
                <input type="text" id="regName" placeholder="Nama kamu" required>
            </div>
            <div class="input-group">
                <label>Email Aktif</label>
                <input type="email" id="regEmail" placeholder="contoh@gmail.com" required>
            </div>
            <div class="input-group">
                <label>Buat Kata Sandi</label>
                <input type="password" id="regPassword" placeholder="Minimal 6 karakter" required>
            </div>
            <button type="submit" class="btn-auth" id="btnRegister">KIRIM KODE OTP <i class="fas fa-paper-plane ml-1"></i></button>
        </form>
        <div class="toggle-text">Sudah punya akun? <a href="loginpembeli.html">Masuk di sini</a></div>
    </div>

    <div class="auth-card" id="otpSection" style="display: none;">
        <i class="fas fa-envelope-open-text auth-icon" style="color: #FF9800; filter: drop-shadow(0 4px 10px rgba(255, 152, 0, 0.4));"></i>
        <h1 class="auth-title">Verifikasi Email</h1>
        <p class="auth-subtitle">Masukkan kode sakti yang dikirim ke emailmu</p>
        
        <form id="formOTP">
            <div class="input-group">
                <label style="text-align: center;">KODE OTP (ANGKA)</label>
                <input type="text" id="otpCode" placeholder="Contoh: 123456" style="text-align: center; font-size: 18px; letter-spacing: 5px; font-weight: 800;" required>
            </div>
            <button type="submit" class="btn-auth" id="btnVerifyOTP" style="background: linear-gradient(135deg, #FF9800, #F57C00); box-shadow: 0 10px 20px rgba(255, 152, 0, 0.3);">VERIFIKASI OTP <i class="fas fa-check-circle ml-1"></i></button>
        </form>
    </div>

    <div id="customToast"></div>

    <script>
        function showToast(msg, type = 'error') {
            const toast = document.getElementById("customToast");
            toast.innerText = msg;
            toast.className = type + " show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        let tempEmail = "";

        document.getElementById('formRegister').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnRegister');
            btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Memproses...";

            tempEmail = document.getElementById('regEmail').value;
            const bodyData = { name: document.getElementById('regName').value, email: tempEmail, password: document.getElementById('regPassword').value };

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });
                const data = await res.json();

                if(data.success) {
                    showToast("Cek Email/Spam untuk kode OTP!", "success");
                    document.getElementById('registerSection').style.display = 'none';
                    document.getElementById('otpSection').style.display = 'block';
                } else {
                    showToast(data.message, "error");
                }
            } catch(err) {
                showToast("Server sibuk! Coba lagi nanti.", "error");
            } finally {
                btn.innerHTML = "KIRIM KODE OTP <i class='fas fa-paper-plane ml-1'></i>";
            }
        });

        document.getElementById('formOTP').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnVerifyOTP');
            btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Memverifikasi...";

            const bodyData = { email: tempEmail, otp: document.getElementById('otpCode').value };

            try {
                const res = await fetch('/api/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });
                const data = await res.json();

                if(data.success) {
                    showToast("Akun aktif! Silakan Login.", "success");
                    setTimeout(() => { window.location.href = 'loginpembeli.html'; }, 1500);
                } else {
                    showToast(data.message, "error");
                }
            } catch(err) {
                showToast("Server sibuk! Coba lagi nanti.", "error");
            } finally {
                btn.innerHTML = "VERIFIKASI OTP <i class='fas fa-check-circle ml-1'></i>";
            }
        });
    </script>
</body>
</html>
