<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daftar - Belidikita</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f4f7fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .auth-card { background: #fff; width: 90%; max-width: 400px; padding: 30px 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .back-btn { display: flex; align-items: center; color: #888; text-decoration: none; font-size: 12px; font-weight: 600; margin-bottom: 20px; }
        .auth-title { font-size: 20px; font-weight: 800; color: #0D47A1; margin-bottom: 5px; }
        .auth-subtitle { font-size: 12px; color: #666; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 11px; font-weight: 600; color: #555; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 10px; outline: none; font-family: 'Montserrat', sans-serif; font-size: 13px; background: #f9f9f9; }
        .btn-auth { width: 100%; padding: 14px; background: #00AA5B; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 800; cursor: pointer; }
        .toggle-text { margin-top: 20px; font-size: 12px; color: #666; }
        .toggle-text a { color: #1976D2; font-weight: 800; text-decoration: none; }
        
        #customToast { visibility: hidden; min-width: 250px; margin-left: -125px; background-color: #333; color: #fff; text-align: center; border-radius: 25px; padding: 16px; position: fixed; z-index: 9999; left: 50%; bottom: 30px; font-size: 13px; font-weight: 600; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: opacity 0.3s, bottom 0.3s; opacity: 0; }
        #customToast.show { visibility: visible; opacity: 1; bottom: 50px; }
        #customToast.success { background-color: #00AA5B; }
        #customToast.error { background-color: #ff3b30; }
    </style>
</head>
<body>

    <div class="auth-card" id="registerSection">
        <a href="loginpembeli.html" class="back-btn"><i class="fas fa-arrow-left"></i> Kembali ke Login</a>
        <h1 class="auth-title">Buat Akun Baru</h1>
        <p class="auth-subtitle">Daftar untuk menikmati kemudahan belanja</p>

        <form id="formRegister">
            <div class="input-group">
                <label>Nama Lengkap</label>
                <input type="text" id="regName" placeholder="Nama kamu" required>
            </div>
            <div class="input-group">
                <label>Email Aktif</label>
                <input type="email" id="regEmail" placeholder="contoh@gmail.com" required>
            </div>
            <div class="input-group">
                <label>Buat Password</label>
                <input type="password" id="regPassword" placeholder="Minimal 6 karakter" required>
            </div>
            <button type="submit" class="btn-auth" id="btnRegister">KIRIM KODE OTP</button>
        </form>
        <div class="toggle-text">Sudah punya akun? <a href="loginpembeli.html">Masuk di sini</a></div>
    </div>

    <div class="auth-card" id="otpSection" style="display: none;">
        <h1 class="auth-title">Verifikasi Email</h1>
        <p class="auth-subtitle">Masukkan kode OTP yang dikirim ke emailmu</p>
        <form id="formOTP">
            <div class="input-group">
                <label>Kode OTP (Angka)</label>
                <input type="text" id="otpCode" placeholder="Contoh: 123456" required>
            </div>
            <button type="submit" class="btn-auth" id="btnVerifyOTP" style="background:#1976D2;">VERIFIKASI OTP</button>
        </form>
    </div>

    <div id="customToast"></div>

    <script>
        function showToast(msg, type = 'error') {
            const toast = document.getElementById("customToast");
            toast.innerText = msg;
            toast.className = type + " show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        let tempEmail = "";

        document.getElementById('formRegister').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnRegister');
            btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Memproses...";

            tempEmail = document.getElementById('regEmail').value;
            const bodyData = { name: document.getElementById('regName').value, email: tempEmail, password: document.getElementById('regPassword').value };

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });
                const data = await res.json();

                if(data.success) {
                    showToast("Cek Email/Spam untuk kode OTP!", "success");
                    document.getElementById('registerSection').style.display = 'none';
                    document.getElementById('otpSection').style.display = 'block';
                } else {
                    showToast(data.message, "error");
                }
            } catch(err) {
                showToast("Server sibuk! Coba lagi nanti.", "error");
            } finally {
                btn.innerHTML = "KIRIM KODE OTP";
            }
        });

        document.getElementById('formOTP').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnVerifyOTP');
            btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Memverifikasi...";

            const bodyData = { email: tempEmail, otp: document.getElementById('otpCode').value };

            try {
                const res = await fetch('/api/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });
                const data = await res.json();

                if(data.success) {
                    showToast("Akun aktif! Silakan Login.", "success");
                    setTimeout(() => { window.location.href = 'loginpembeli.html'; }, 1500);
                } else {
                    showToast(data.message, "error");
                }
            } catch(err) {
                showToast("Server sibuk! Coba lagi nanti.", "error");
            } finally {
                btn.innerHTML = "VERIFIKASI OTP";
            }
        });
    </script>
</body>
</html>
