<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profil Saya - Belidikita</title>
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,600,800" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    colors: { brand: '#0D47A1', accent: '#00AA5B', light: '#E1F5FE' }
                }
            }
        }
    </script>
    <style>
        body { background: linear-gradient(135deg, #f4f7fa 0%, #e0f2fe 100%); min-height: 100vh; padding-bottom: 80px; }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .input-modern { background: #f8fafc; border: 1px solid #e2e8f0; transition: all 0.3s ease; }
        .input-modern:focus { background: #fff; border-color: #0D47A1; box-shadow: 0 0 0 3px rgba(13, 71, 161, 0.1); outline: none; }
        
        @keyframes fadeUp { 0% { opacity: 0; transform: translateY(15px); } 100% { opacity: 1; transform: translateY(0); } }
        .animate-fade-up { animation: fadeUp 0.4s ease forwards; }

        /* Toast Modern */
        #customToast { visibility: hidden; min-width: 250px; margin-left: -125px; background-color: #333; color: #fff; text-align: center; border-radius: 25px; padding: 16px; position: fixed; z-index: 9999; left: 50%; bottom: 80px; font-size: 13px; font-weight: 600; transition: opacity 0.3s, bottom 0.3s; opacity: 0; box-shadow: 0 10px 30px rgba(0,0,0,0.2);}
        #customToast.show { visibility: visible; opacity: 1; bottom: 100px; }
        #customToast.success { background-color: #00AA5B; }
        #customToast.error { background-color: #ff3b30; }
    </style>
</head>
<body class="text-gray-800 relative">

    <div class="fixed top-0 left-0 w-full z-50 bg-white/80 backdrop-blur-md shadow-sm">
        <div class="max-w-md mx-auto px-5 py-4 flex items-center justify-between">
            <button onclick="window.location.href='../dashboardutama.html'" class="w-10 h-10 rounded-full bg-light text-brand flex justify-center items-center hover:scale-105 transition-transform">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1 class="text-lg font-extrabold text-brand">Profil Akun</h1>
            <button id="btnLogout" class="w-10 h-10 rounded-full bg-red-50 text-red-500 flex justify-center items-center hover:scale-105 transition-transform" title="Keluar">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </div>

    <main class="max-w-md mx-auto pt-24 px-5">
        
        <div class="glass-card rounded-3xl p-6 mb-6 text-center relative overflow-hidden animate-fade-up">
            <div class="absolute top-0 left-0 w-full h-24 bg-gradient-to-r from-brand to-blue-400 opacity-20"></div>
            <div class="relative z-10">
                <div class="w-20 h-20 mx-auto rounded-full bg-gradient-to-tr from-brand to-accent p-1 shadow-lg mb-3">
                    <img src="https://ui-avatars.com/api/?name=User&background=fff&color=0D47A1" id="avatarImg" class="w-full h-full rounded-full border-2 border-white object-cover" alt="Avatar">
                </div>
                <h2 id="displayNama" class="text-xl font-extrabold text-gray-800">Memuat...</h2>
                <p id="displayEmail" class="text-xs font-semibold text-gray-500 mb-1">Memuat...</p>
                <p id="displayBio" class="text-xs text-gray-500 italic mb-2">"Belum ada bio"</p>
                <span class="inline-block px-3 py-1 bg-accent/10 text-accent text-xs font-bold rounded-full"><i class="fas fa-check-circle mr-1"></i> Member Aktif</span>
            </div>
        </div>

        <div class="flex space-x-2 bg-white/50 p-1 rounded-2xl mb-4 backdrop-blur-md shadow-sm animate-fade-up" style="animation-delay: 0.1s;">
            <button id="tabRiwayat" class="flex-1 py-2.5 text-xs font-bold bg-white shadow-sm rounded-xl text-brand transition" onclick="bukaTab('Riwayat')"><i class="fas fa-box mr-1"></i> Riwayat</button>
            <button id="tabAlamat" class="flex-1 py-2.5 text-xs font-bold text-gray-500 hover:text-brand transition" onclick="bukaTab('Alamat')"><i class="fas fa-map-marker-alt mr-1"></i> Alamat</button>
            <button id="tabPengaturan" class="flex-1 py-2.5 text-xs font-bold text-gray-500 hover:text-brand transition" onclick="bukaTab('Pengaturan')"><i class="fas fa-cog mr-1"></i> Profil</button>
        </div>

        <div id="secRiwayat" class="animate-fade-up">
            <div class="glass-card rounded-2xl p-4 mb-3">
                <div class="flex justify-between items-center border-b border-gray-100 pb-2 mb-3">
                    <span class="text-xs font-bold text-gray-500"><i class="fas fa-store text-brand mr-1"></i> Belidikita Official</span>
                    <span class="text-[10px] font-bold bg-blue-100 text-brand px-2 py-1 rounded">SEDANG DIKIRIM</span>
                </div>
                <div class="flex gap-3 items-center mb-3">
                    <div class="w-14 h-14 bg-gray-200 rounded-lg flex-shrink-0">
                        <img src="https://via.placeholder.com/150" class="w-full h-full object-cover rounded-lg" alt="Barang">
                    </div>
                    <div>
                        <h4 class="text-sm font-bold text-gray-800 line-clamp-1">Sepatu Sneakers Kece</h4>
                        <p class="text-xs text-gray-500">1 Barang</p>
                    </div>
                </div>
                <div class="bg-gray-50 rounded-lg p-3 mb-3 border border-gray-100">
                    <p class="text-[11px] text-gray-500 font-semibold mb-1">Kurir: <span class="text-brand">J&T Express</span></p>
                    <p class="text-xs font-extrabold text-gray-800 flex justify-between items-center">
                        <span>No. Resi: JP1234567890</span>
                        <button onclick="salinResi('JP1234567890')" class="text-brand text-[10px] bg-blue-100 px-2 py-1 rounded"><i class="fas fa-copy"></i> Salin</button>
                    </p>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-xs font-semibold text-gray-500">Total Belanja</span>
                    <span class="text-sm font-extrabold text-orange-500">Rp 162.000</span>
                </div>
            </div>

            <div class="text-center py-10 opacity-50 hidden">
                <i class="fas fa-box-open text-4xl mb-3"></i>
                <p class="text-xs font-bold">Belum ada pesanan.</p>
            </div>
        </div>

        <div id="secAlamat" class="hidden">
            <div class="glass-card rounded-3xl p-6 mb-6">
                <div class="bg-yellow-50 border-l-4 border-yellow-400 p-3 rounded-r-lg mb-4">
                    <p class="text-[10px] text-yellow-700 font-bold"><i class="fas fa-info-circle"></i> Pastikan alamat diisi lengkap untuk perhitungan ongkir otomatis.</p>
                </div>
                <form id="formAlamat" class="space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Nama Penerima</label>
                            <input type="text" id="inputNamaPenerima" class="input-modern w-full rounded-xl px-4 py-3 text-sm font-semibold" required>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">No. WhatsApp</label>
                            <input type="number" id="inputWA" class="input-modern w-full rounded-xl px-4 py-3 text-sm font-semibold" required>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Provinsi</label>
                        <select id="selectProvinsi" class="input-modern w-full rounded-xl px-4 py-3 text-sm font-semibold appearance-none" required>
                            <option value="">-- Pilih Provinsi --</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Kota / Kabupaten</label>
                        <select id="selectKota" class="input-modern w-full rounded-xl px-4 py-3 text-sm font-semibold appearance-none" disabled required>
                            <option value="">-- Pilih Kota --</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Detail Jalan & Patokan</label>
                        <textarea id="inputDetail" rows="2" class="input-modern w-full rounded-xl px-4 py-3 text-sm font-semibold" placeholder="Contoh: Jl. Mawar No 10..." required></textarea>
                    </div>
                    <button type="submit" id="btnSimpanAlamat" class="w-full bg-brand hover:bg-blue-800 text-white font-extrabold rounded-xl py-3 shadow-lg transition-all mt-2">
                        <i class="fas fa-save mr-1"></i> Simpan Alamat
                    </button>
                </form>
            </div>
        </div>

        <div id="secPengaturan" class="hidden">
            <div class="glass-card rounded-3xl p-6 mb-6">
                <form id="formPengaturanProfil" class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Nama Tampilan</label>
                        <input type="text" id="inputEditNama" class="input-modern w-full rounded-xl px-4 py-3 text-sm font-semibold" required>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">Bio Singkat</label>
                        <input type="text" id="inputEditBio" class="input-modern w-full rounded-xl px-4 py-3 text-sm font-semibold" placeholder="Tulis sesuatu tentangmu...">
                    </div>
                    <button type="submit" id="btnSimpanProfil" class="w-full bg-gray-800 hover:bg-black text-white font-extrabold rounded-xl py-3 shadow-lg transition-all mt-2">
                        <i class="fas fa-user-edit mr-1"></i> Update Profil
                    </button>
                </form>
            </div>
        </div>

    </main>

    <div id="customToast"></div>

    <script>
        function showToast(msg, type = 'info') {
            const toast = document.getElementById("customToast");
            toast.innerText = msg;
            toast.className = type + " show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        const token = localStorage.getItem('token');
        if (!token) {
            showToast("Silakan login terlebih dahulu", "error");
            setTimeout(() => window.location.href = 'loginpembeli.html', 1500);
        }

        // ==========================================
        // LOGIKA PINDAH TABS MENU
        // ==========================================
        function bukaTab(namaTab) {
            // Reset semua tombol tab
            const tabs = ['tabRiwayat', 'tabAlamat', 'tabPengaturan'];
            tabs.forEach(t => {
                document.getElementById(t).className = "flex-1 py-2.5 text-xs font-bold text-gray-500 hover:text-brand transition";
            });

            // Sembunyikan semua konten
            const secs = ['secRiwayat', 'secAlamat', 'secPengaturan'];
            secs.forEach(s => {
                document.getElementById(s).classList.add('hidden');
                document.getElementById(s).classList.remove('animate-fade-up');
            });

            // Aktifkan yang diklik
            document.getElementById('tab' + namaTab).className = "flex-1 py-2.5 text-xs font-bold bg-white shadow-sm rounded-xl text-brand transition";
            const targetSec = document.getElementById('sec' + namaTab);
            targetSec.classList.remove('hidden');
            
            // Trik memicu ulang animasi CSS
            void targetSec.offsetWidth; 
            targetSec.classList.add('animate-fade-up');
        }

        function salinResi(resi) {
            navigator.clipboard.writeText(resi);
            showToast("Resi " + resi + " disalin!", "success");
        }

        // ==========================================
        // API WILAYAH INDONESIA (EMSIFA) - ALAMAT
        // ==========================================
        const selectProvinsi = document.getElementById('selectProvinsi');
        const selectKota = document.getElementById('selectKota');
        let namaProvinsiTerpilih = "";
        let namaKotaTerpilih = "";

        fetch('https://www.emsifa.com/api-wilayah-indonesia/api/provinces.json')
            .then(res => res.json())
            .then(data => {
                data.forEach(prov => {
                    const option = document.createElement('option');
                    option.value = prov.id; option.text = prov.name;
                    selectProvinsi.appendChild(option);
                });
            });

        selectProvinsi.addEventListener('change', function() {
            const provId = this.value;
            namaProvinsiTerpilih = this.options[this.selectedIndex].text;
            selectKota.innerHTML = '<option value="">-- Sedang Memuat... --</option>';
            selectKota.disabled = true;

            if(provId) {
                fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/regencies/${provId}.json`)
                    .then(res => res.json())
                    .then(data => {
                        selectKota.innerHTML = '<option value="">-- Pilih Kota --</option>';
                        data.forEach(kota => {
                            const option = document.createElement('option');
                            option.value = kota.id; option.text = kota.name;
                            selectKota.appendChild(option);
                        });
                        selectKota.disabled = false;
                    });
            } else {
                selectKota.innerHTML = '<option value="">-- Pilih Kota --</option>';
            }
        });

        selectKota.addEventListener('change', function() {
            namaKotaTerpilih = this.options[this.selectedIndex].text;
        });

        // ==========================================
        // LOAD DATA AWAL DARI SERVER
        // ==========================================
        async function loadProfileData() {
            try {
                // 1. Load Info Akun Dasar
                const resProf = await fetch('/api/profile', { headers: { 'Authorization': `Bearer ${token}` } });
                const resultProf = await resProf.json();
                if (resultProf.success) {
                    const data = resultProf.data;
                    document.getElementById('displayNama').innerText = data.name;
                    document.getElementById('displayEmail').innerText = data.email;
                    if(data.bio) document.getElementById('displayBio').innerText = `"${data.bio}"`;
                    
                    // Taruh di Form Pengaturan
                    document.getElementById('inputEditNama').value = data.name;
                    if(data.bio) document.getElementById('inputEditBio').value = data.bio;
                    
                    document.getElementById('avatarImg').src = `https://ui-avatars.com/api/?name=${data.name}&background=E1F5FE&color=0D47A1&bold=true`;
                    
                    // Taruh nama ke Form Alamat otomatis
                    document.getElementById('inputNamaPenerima').value = data.name;
                }

                // 2. Load Alamat Tersimpan
                const resAddr = await fetch('/api/address', { headers: { 'Authorization': `Bearer ${token}` } });
                const resultAddr = await resAddr.json();
                if (resultAddr.success && resultAddr.data) {
                    document.getElementById('inputNamaPenerima').value = resultAddr.data.nama_penerima;
                    document.getElementById('inputWA').value = resultAddr.data.nomor_wa;
                    document.getElementById('inputDetail').value = resultAddr.data.alamat_lengkap;
                }
            } catch (err) { console.error("Gagal memuat data", err); }
        }
        loadProfileData();

        // ==========================================
        // AKSI SIMPAN ALAMAT PENGIRIMAN
        // ==========================================
        document.getElementById('formAlamat').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSimpanAlamat');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menyimpan...';

            if(!selectProvinsi.value || !selectKota.value) {
                showToast("Pilih Provinsi dan Kota dari menu yang tersedia!", "error");
                btn.innerHTML = '<i class="fas fa-save"></i> Simpan Alamat';
                return;
            }

            const payload = {
                nama: document.getElementById('inputNamaPenerima').value,
                wa: document.getElementById('inputWA').value,
                detail: `${document.getElementById('inputDetail').value}, ${namaKotaTerpilih}, ${namaProvinsiTerpilih}`
            };

            try {
                const res = await fetch('/api/address', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.success) {
                    showToast("Alamat berhasil diupdate! 🎉", "success");
                }
            } catch (err) { showToast("Gagal simpan alamat", "error"); }
            finally { btn.innerHTML = '<i class="fas fa-save"></i> Simpan Alamat'; }
        });

        // ==========================================
        // AKSI UPDATE PROFIL (Nama & Bio)
        // ==========================================
        document.getElementById('formPengaturanProfil').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSimpanProfil');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';

            const payload = {
                name: document.getElementById('inputEditNama').value,
                bio: document.getElementById('inputEditBio').value
            };

            try {
                const res = await fetch('/api/profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.success) {
                    showToast("Profil berhasil diperbarui!", "success");
                    loadProfileData(); // Refresh UI Atas
                } else {
                    showToast("Gagal update profil", "error");
                }
            } catch (err) { showToast("Server Error", "error"); }
            finally { btn.innerHTML = '<i class="fas fa-user-edit"></i> Update Profil'; }
        });

                // ==========================================
        // LOAD RIWAYAT PESANAN DARI DATABASE
        // ==========================================
        async function loadRiwayatPesanan() {
            const containerRiwayat = document.getElementById('secRiwayat');
            try {
                const res = await fetch('/api/orders/me', { headers: { 'Authorization': `Bearer ${token}` } });
                const result = await res.json();

                if(result.success && result.data.length > 0) {
                    containerRiwayat.innerHTML = ''; // Bersihkan desain dummy

                    result.data.forEach(order => {
                        // Bongkar data barang
                        const items = JSON.parse(order.items);
                        const barangPertama = items[0]; // Tampilkan 1 barang saja sbg cover
                        const sisaBarang = items.length > 1 ? ` + ${items.length - 1} barang lainnya` : '';
                        
                        // Warna Status
                        let statusColor = "bg-yellow-100 text-yellow-700";
                        if(order.status === 'Diproses') statusColor = "bg-blue-100 text-blue-700";
                        if(order.status === 'Dikirim') statusColor = "bg-purple-100 text-purple-700";
                        if(order.status === 'Selesai') statusColor = "bg-green-100 text-green-700";

                        const formatRp = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(order.total_price);

                        containerRiwayat.innerHTML += `
                            <div class="glass-card rounded-2xl p-4 mb-3">
                                <div class="flex justify-between items-center border-b border-gray-100 pb-2 mb-3">
                                    <span class="text-xs font-bold text-gray-500"><i class="fas fa-store text-brand mr-1"></i> Order #ORD-${order.id}</span>
                                    <span class="text-[10px] font-bold ${statusColor} px-2 py-1 rounded uppercase">${order.status}</span>
                                </div>
                                <div class="flex gap-3 items-center mb-3">
                                    <div class="w-14 h-14 bg-gray-200 rounded-lg flex-shrink-0">
                                        <img src="${barangPertama.foto}" class="w-full h-full object-cover rounded-lg" alt="Barang">
                                    </div>
                                    <div>
                                        <h4 class="text-sm font-bold text-gray-800 line-clamp-1">${barangPertama.nama}</h4>
                                        <p class="text-[11px] text-gray-500">${barangPertama.qty} Barang ${sisaBarang}</p>
                                    </div>
                                </div>
                                <div class="bg-gray-50 rounded-lg p-3 mb-3 border border-gray-100">
                                    <p class="text-[11px] text-gray-500 font-semibold mb-1">Kurir: <span class="text-brand">${order.shipping_courier}</span></p>
                                    <p class="text-xs font-extrabold text-gray-800 flex justify-between items-center">
                                        <span>Resi: ${order.resi}</span>
                                        ${order.resi !== '-' ? `<button onclick="salinResi('${order.resi}')" class="text-brand text-[10px] bg-blue-100 px-2 py-1 rounded"><i class="fas fa-copy"></i> Salin</button>` : ''}
                                    </p>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="text-xs font-semibold text-gray-500">Total Tagihan</span>
                                    <span class="text-sm font-extrabold text-orange-500">${formatRp}</span>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    containerRiwayat.innerHTML = `
                        <div class="text-center py-10 opacity-50">
                            <i class="fas fa-box-open text-4xl mb-3"></i>
                            <p class="text-xs font-bold">Belum ada pesanan.</p>
                        </div>
                    `;
                }
            } catch (err) { console.error("Gagal load riwayat", err); }
        }
        
        // Panggil fungsinya saat web dibuka
        loadRiwayatPesanan();


        // LOGOUT
        document.getElementById('btnLogout').addEventListener('click', () => {
            localStorage.removeItem('token');
            showToast("Berhasil Keluar", "success");
            setTimeout(() => window.location.href = '../dashboardutama.html', 1000);
        });

    </script>
</body>
</html>
