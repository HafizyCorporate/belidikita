<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profil Saya - Belidikita</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f4f7fa; font-family: 'Montserrat', sans-serif; }
        .header-profile { background: #1976D2; color: #fff; padding: 30px 20px; text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; position: relative; }
        .btn-back-home { position: absolute; top: 20px; left: 20px; color: #fff; font-size: 20px; text-decoration: none; }
        .avatar { width: 80px; height: 80px; background: #fff; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 30px; color: #1976D2; box-shadow: 0 4px 10px rgba(0,0,0,0.2); overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; display: none; } /* Default sembunyi sampai ada foto */
        .profile-name { font-size: 18px; font-weight: 800; margin-bottom: 5px; }
        .profile-email { font-size: 12px; opacity: 0.8; }
        
        .profile-menu { margin: 20px; background: #fff; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow: hidden; }
        .menu-item { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid #eee; text-decoration: none; color: #333; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .menu-item:hover { background: #f9f9f9; }
        .menu-item:last-child { border-bottom: none; }
        .menu-item i.icon-left { font-size: 18px; color: #1976D2; width: 30px; text-align: center; margin-right: 10px; }
        .menu-item i.icon-right { color: #ccc; font-size: 14px; }
        
        .btn-logout { margin: 20px; padding: 15px; background: #ff3b30; color: #fff; text-align: center; border-radius: 12px; font-weight: 800; display: block; text-decoration: none; box-shadow: 0 4px 10px rgba(255, 59, 48, 0.2); }

        /* JENDELA POP-UP (MODAL) KHUSUS PROFIL */
        .modal-profil { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content-profil { background-color: #fff; margin: 15vh auto; padding: 20px; border-radius: 15px; width: 90%; max-width: 400px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.3); animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close-modal { position: absolute; top: 15px; right: 20px; color: #aaa; font-size: 24px; font-weight: bold; cursor: pointer; }
        .modal-title { font-size: 18px; font-weight: 800; color: #0D47A1; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        /* FORM DALAM MODAL */
        .form-group { margin-bottom: 12px; text-align: left; }
        .form-group label { display: block; font-size: 11px; font-weight: 600; color: #555; margin-bottom: 5px; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px 15px; border: 1px solid #ddd; border-radius: 8px; font-family: 'Montserrat', sans-serif; font-size: 12px; outline: none; background: #f9f9f9; }
        .form-group input:focus, .form-group textarea:focus { border-color: #1976D2; background: #fff; }
        .btn-save { width: 100%; padding: 12px; background: #00AA5B; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* TOAST NOTIFIKASI */
        #customToast { visibility: hidden; min-width: 250px; margin-left: -125px; background-color: #333; color: #fff; text-align: center; border-radius: 25px; padding: 16px; position: fixed; z-index: 9999; left: 50%; bottom: 30px; font-size: 13px; font-weight: 600; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: opacity 0.3s, bottom 0.3s; opacity: 0; }
        #customToast.show { visibility: visible; opacity: 1; bottom: 50px; }
        #customToast.success { background-color: #00AA5B; }
        #customToast.error { background-color: #ff3b30; }
    </style>
</head>
<body>

    <div class="header-profile">
        <a href="../dashboardutama.html" class="btn-back-home"><i class="fas fa-arrow-left"></i></a>
        <div class="avatar" id="avatarContainer">
            <i class="fas fa-user" id="avatarIcon"></i>
            <img id="avatarImage" src="" alt="Foto Profil">
        </div>
        <div class="profile-name" id="profileName">Memuat...</div>
        <div class="profile-email" id="profileEmail">Memuat Email...</div>
    </div>

    <div class="profile-menu">
        <div class="menu-item" onclick="bukaModal('modalAlamat')">
            <div style="display:flex; align-items:center;"><i class="fas fa-map-marker-alt icon-left"></i> Alamat Pengiriman</div>
            <i class="fas fa-chevron-right icon-right"></i>
        </div>
        <div class="menu-item" onclick="bukaModal('modalPesanan')">
            <div style="display:flex; align-items:center;"><i class="fas fa-box icon-left"></i> Riwayat Pesanan</div>
            <i class="fas fa-chevron-right icon-right"></i>
        </div>
        <div class="menu-item" onclick="bukaModal('modalPengaturan')">
            <div style="display:flex; align-items:center;"><i class="fas fa-cog icon-left"></i> Pengaturan Akun</div>
            <i class="fas fa-chevron-right icon-right"></i>
        </div>
    </div>

    <a href="#" class="btn-logout" onclick="logout(event)"><i class="fas fa-sign-out-alt"></i> Keluar dari Akun</a>

    <div id="modalAlamat" class="modal-profil">
        <div class="modal-content-profil">
            <span class="close-modal" onclick="tutupModal('modalAlamat')">&times;</span>
            <h2 class="modal-title"><i class="fas fa-truck"></i> Alamat Rumah</h2>
            <form id="formAlamat">
                <div class="form-group">
                    <label>Nama Penerima</label>
                    <input type="text" id="alamatNama" placeholder="Contoh: Budi Santoso" required>
                </div>
                <div class="form-group">
                    <label>Nomor WhatsApp</label>
                    <input type="number" id="alamatWA" placeholder="Contoh: 081234567890" required>
                </div>
                <div class="form-group">
                    <label>Alamat Lengkap (Jalan, RT/RW, Patokan)</label>
                    <textarea id="alamatDetail" rows="3" placeholder="Contoh: Jl. Mawar No. 12, Pagar Hitam" required></textarea>
                </div>
                <button type="submit" class="btn-save" id="btnSimpanAlamat"><i class="fas fa-save"></i> Simpan Alamat</button>
            </form>
        </div>
    </div>

    <div id="modalPesanan" class="modal-profil">
        <div class="modal-content-profil">
            <span class="close-modal" onclick="tutupModal('modalPesanan')">&times;</span>
            <h2 class="modal-title"><i class="fas fa-shopping-bag"></i> Riwayat Pesanan</h2>
            <div style="text-align: center; padding: 20px 0; color: #888;">
                <i class="fas fa-box-open" style="font-size: 40px; color: #ddd; margin-bottom: 10px;"></i>
                <p style="font-size: 12px;">Belum ada riwayat pesanan.</p>
                <p style="font-size: 10px; margin-top: 5px; color: #aaa;">(Sistem WA Checkout aktif)</p>
            </div>
        </div>
    </div>

    <div id="modalPengaturan" class="modal-profil">
        <div class="modal-content-profil">
            <span class="close-modal" onclick="tutupModal('modalPengaturan')">&times;</span>
            <h2 class="modal-title"><i class="fas fa-user-edit"></i> Edit Profil</h2>
            <form id="formPengaturan">
                <div class="form-group">
                    <label>Link Foto Profil (URL Image)</label>
                    <input type="text" id="aturFoto" placeholder="Masukkan link foto (opsional)">
                </div>
                <div class="form-group">
                    <label>Ubah Nama Akun</label>
                    <input type="text" id="aturNama" placeholder="Nama baru kamu" required>
                </div>
                <div class="form-group">
                    <label>Metode Pembayaran Pilihan</label>
                    <input type="text" id="aturBank" placeholder="Contoh: BCA / Dana / COD">
                </div>
                <button type="submit" class="btn-save" id="btnSimpanPengaturan" style="background:#1976D2;"><i class="fas fa-check-circle"></i> Perbarui Akun</button>
            </form>
        </div>
    </div>

    <div id="customToast"></div>

    <script>
        // --- SISTEM NOTIFIKASI ---
        function showToast(msg, type = 'info') {
            const toast = document.getElementById("customToast");
            toast.innerText = msg;
            toast.className = type + " show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        // --- SISTEM BUKA TUTUP JENDELA (MODAL) ---
        function bukaModal(idModal) { document.getElementById(idModal).style.display = 'block'; }
        function tutupModal(idModal) { document.getElementById(idModal).style.display = 'none'; }
        window.onclick = function(event) {
            if (event.target.classList.contains('modal-profil')) { event.target.style.display = "none"; }
        }

        // --- TARIK DATA ASLI SAAT HALAMAN DIBUKA ---
        document.addEventListener("DOMContentLoaded", async () => {
            const token = localStorage.getItem('token');
            if(!token) { window.location.href = 'loginpembeli.html'; return; }

            try {
                const res = await fetch('/api/profile', { headers: { 'Authorization': `Bearer ${token}` } });
                const result = await res.json();
                
                if(result.success) {
                    // Update tampilan Profil Atas
                    document.getElementById('profileName').innerText = result.data.name;
                    document.getElementById('profileEmail').innerText = result.data.email;
                    document.getElementById('aturNama').value = result.data.name; // Isi otomatis di form edit
                    
                    // Cek jika ada foto profil tersimpan
                    if(result.data.avatar_url) {
                        document.getElementById('avatarIcon').style.display = 'none';
                        document.getElementById('avatarImage').style.display = 'block';
                        document.getElementById('avatarImage').src = result.data.avatar_url;
                        document.getElementById('aturFoto').value = result.data.avatar_url;
                    }
                    
                    // Simulasi Tarik Data Alamat (Nanti disambung ke Database)
                    const simpananAlamat = localStorage.getItem('alamat_pembeli');
                    if(simpananAlamat) {
                        const dataAlamat = JSON.parse(simpananAlamat);
                        document.getElementById('alamatNama').value = dataAlamat.nama;
                        document.getElementById('alamatWA').value = dataAlamat.wa;
                        document.getElementById('alamatDetail').value = dataAlamat.detail;
                    }

                } else {
                    localStorage.removeItem('token');
                    window.location.href = 'loginpembeli.html';
                }
            } catch (err) {
                document.getElementById('profileName').innerText = "Gagal Memuat";
            }
        });

        // --- LOGIKA SIMPAN ALAMAT (SEMENTARA PAKE LOCALSTORAGE) ---
        document.getElementById('formAlamat').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSimpanAlamat');
            btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Menyimpan...";

            const dataAlamat = {
                nama: document.getElementById('alamatNama').value,
                wa: document.getElementById('alamatWA').value,
                detail: document.getElementById('alamatDetail').value
            };

            // Simpan di memori HP pembeli
            localStorage.setItem('alamat_pembeli', JSON.stringify(dataAlamat));
            
            setTimeout(() => {
                showToast("✅ Alamat berhasil disimpan!", "success");
                btn.innerHTML = "<i class='fas fa-save'></i> Simpan Alamat";
                tutupModal('modalAlamat');
            }, 800);
        });

        // --- LOGIKA SIMPAN PENGATURAN (Nembak ke Backend /api/profile) ---
        document.getElementById('formPengaturan').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('token');
            const btn = document.getElementById('btnSimpanPengaturan');
            btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Memperbarui...";

            const bodyData = {
                name: document.getElementById('aturNama').value,
                avatar_url: document.getElementById('aturFoto').value,
                bio: document.getElementById('aturBank').value // Kita pakai kolom bio untuk simpan metode bayar
            };

            try {
                const res = await fetch('/api/profile', {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify(bodyData)
                });
                const data = await res.json();

                if(data.success) {
                    showToast("✅ Profil berhasil diperbarui!", "success");
                    tutupModal('modalPengaturan');
                    setTimeout(() => location.reload(), 1000); // Refresh agar nama & foto berubah
                } else {
                    showToast("Gagal: " + data.message, "error");
                }
            } catch(err) {
                showToast("Gagal menyambung ke server", "error");
            } finally {
                btn.innerHTML = "<i class='fas fa-check-circle'></i> Perbarui Akun";
            }
        });

        // --- LOGIKA LOGOUT ---
        function logout(e) {
            e.preventDefault();
            if(confirm("Yakin ingin keluar dari akun?")) {
                localStorage.removeItem('token');
                window.location.href = '../dashboardutama.html';
            }
        }
    </script>
</body>
</html>
