<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profil Saya - Belidikita</title>
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,600,800" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    colors: { brand: '#0D47A1', accent: '#00AA5B', light: '#E1F5FE' }
                }
            }
        }
    </script>
    <style>
        /* Animasi Kustom & Glassmorphism */
        body { background: linear-gradient(135deg, #f4f7fa 0%, #e0f2fe 100%); min-height: 100vh; padding-bottom: 80px; }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .input-modern { background: #f8fafc; border: 1px solid #e2e8f0; transition: all 0.3s ease; }
        .input-modern:focus { background: #fff; border-color: #0D47A1; box-shadow: 0 0 0 3px rgba(13, 71, 161, 0.1); outline: none; }
        
        /* Animasi Masuk */
        @keyframes fadeUp { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
        .animate-fade-up { animation: fadeUp 0.6s ease forwards; }
        .delay-100 { animation-delay: 0.1s; }
        .delay-200 { animation-delay: 0.2s; }

        /* Toast Modern */
        #customToast { visibility: hidden; min-width: 250px; margin-left: -125px; background-color: #333; color: #fff; text-align: center; border-radius: 25px; padding: 16px; position: fixed; z-index: 9999; left: 50%; bottom: 80px; font-size: 13px; font-weight: 600; transition: opacity 0.3s, bottom 0.3s; opacity: 0; box-shadow: 0 10px 30px rgba(0,0,0,0.2);}
        #customToast.show { visibility: visible; opacity: 1; bottom: 100px; }
        #customToast.success { background-color: #00AA5B; }
        #customToast.error { background-color: #ff3b30; }
    </style>
</head>
<body class="text-gray-800 relative">

    <div class="fixed top-0 left-0 w-full z-50 bg-white/80 backdrop-blur-md shadow-sm">
        <div class="max-w-md mx-auto px-5 py-4 flex items-center justify-between">
            <button onclick="window.location.href='../dashboardutama.html'" class="w-10 h-10 rounded-full bg-light text-brand flex justify-center items-center hover:scale-105 transition-transform">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1 class="text-lg font-extrabold text-brand">Profil Akun</h1>
            <button id="btnLogout" class="w-10 h-10 rounded-full bg-red-50 text-red-500 flex justify-center items-center hover:scale-105 transition-transform">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </div>

    <main class="max-w-md mx-auto pt-24 px-5">
        
        <div class="glass-card rounded-3xl p-6 mb-6 animate-fade-up text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-24 bg-gradient-to-r from-brand to-blue-400 opacity-20"></div>
            <div class="relative z-10">
                <div class="w-20 h-20 mx-auto rounded-full bg-gradient-to-tr from-brand to-accent p-1 shadow-lg mb-3">
                    <img src="https://ui-avatars.com/api/?name=User&background=fff&color=0D47A1" id="avatarImg" class="w-full h-full rounded-full border-2 border-white object-cover" alt="Avatar">
                </div>
                <h2 id="displayNama" class="text-xl font-extrabold text-gray-800">Memuat...</h2>
                <p id="displayEmail" class="text-xs font-semibold text-gray-500 mb-2">Memuat...</p>
                <span class="inline-block px-3 py-1 bg-accent/10 text-accent text-xs font-bold rounded-full"><i class="fas fa-check-circle mr-1"></i> Member Aktif</span>
            </div>
        </div>

        <div class="glass-card rounded-3xl p-6 mb-6 animate-fade-up delay-100">
            <h3 class="text-sm font-extrabold text-brand border-b border-gray-100 pb-3 mb-4 flex items-center">
                <i class="fas fa-map-marker-alt mr-2 text-lg"></i> Alamat Pengiriman (Siap RajaOngkir)
            </h3>
            
            <form id="formProfil" class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">Nama Penerima</label>
                        <input type="text" id="inputNama" class="input-modern w-full rounded-xl px-4 py-3 text-sm font-semibold" placeholder="Contoh: Budi Santoso" required>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">No. WhatsApp</label>
                        <input type="number" id="inputWA" class="input-modern w-full rounded-xl px-4 py-3 text-sm font-semibold" placeholder="0812..." required>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">Provinsi</label>
                    <select id="selectProvinsi" class="input-modern w-full rounded-xl px-4 py-3 text-sm font-semibold appearance-none cursor-pointer" required>
                        <option value="">-- Pilih Provinsi --</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">Kota / Kabupaten</label>
                    <select id="selectKota" class="input-modern w-full rounded-xl px-4 py-3 text-sm font-semibold appearance-none cursor-pointer" disabled required>
                        <option value="">-- Pilih Kota --</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-600 mb-1">Detail Jalan & Patokan</label>
                    <textarea id="inputDetail" rows="2" class="input-modern w-full rounded-xl px-4 py-3 text-sm font-semibold" placeholder="Contoh: Jl. Mawar No 10, RT 01/02, Pagar Merah" required></textarea>
                </div>

                <button type="submit" id="btnSimpan" class="w-full bg-brand hover:bg-blue-800 text-white font-extrabold rounded-xl py-4 shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all mt-2">
                    <i class="fas fa-save mr-2"></i> SIMPAN ALAMAT
                </button>
            </form>
        </div>

    </main>

    <div id="customToast"></div>

    <script>
        function showToast(msg, type = 'info') {
            const toast = document.getElementById("customToast");
            toast.innerText = msg;
            toast.className = type + " show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        const token = localStorage.getItem('token');
        if (!token) {
            showToast("Silakan login terlebih dahulu", "error");
            setTimeout(() => window.location.href = 'loginpembeli.html', 1500);
        }

        // ==========================================
        // 1. API WILAYAH INDONESIA (EMSIFA)
        // ==========================================
        const selectProvinsi = document.getElementById('selectProvinsi');
        const selectKota = document.getElementById('selectKota');
        
        let namaProvinsiTerpilih = "";
        let namaKotaTerpilih = "";

        // Ambil Data Provinsi
        fetch('https://www.emsifa.com/api-wilayah-indonesia/api/provinces.json')
            .then(res => res.json())
            .then(data => {
                data.forEach(prov => {
                    const option = document.createElement('option');
                    option.value = prov.id;
                    option.text = prov.name;
                    selectProvinsi.appendChild(option);
                });
            });

        // Jika Provinsi Dipilih -> Ambil Kota
        selectProvinsi.addEventListener('change', function() {
            const provId = this.value;
            namaProvinsiTerpilih = this.options[this.selectedIndex].text;
            
            selectKota.innerHTML = '<option value="">-- Sedang Memuat Kota... --</option>';
            selectKota.disabled = true;

            if(provId) {
                fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/regencies/${provId}.json`)
                    .then(res => res.json())
                    .then(data => {
                        selectKota.innerHTML = '<option value="">-- Pilih Kota --</option>';
                        data.forEach(kota => {
                            const option = document.createElement('option');
                            option.value = kota.id; // Nanti ID ini yg dipakai RajaOngkir
                            option.text = kota.name;
                            selectKota.appendChild(option);
                        });
                        selectKota.disabled = false;
                    });
            } else {
                selectKota.innerHTML = '<option value="">-- Pilih Kota --</option>';
            }
        });

        selectKota.addEventListener('change', function() {
            namaKotaTerpilih = this.options[this.selectedIndex].text;
        });

        // ==========================================
        // 2. LOAD DATA PROFIL & ALAMAT LAMA
        // ==========================================
        async function loadProfile() {
            try {
                // Load Info Dasar
                const resProfile = await fetch('/api/profile', { headers: { 'Authorization': `Bearer ${token}` } });
                const resultProfile = await resProfile.json();
                
                if (resultProfile.success) {
                    document.getElementById('displayNama').innerText = resultProfile.data.name;
                    document.getElementById('displayEmail').innerText = resultProfile.data.email;
                    document.getElementById('inputNama').value = resultProfile.data.name;
                    
                    // Ganti foto profil berdasarkan inisial nama
                    document.getElementById('avatarImg').src = `https://ui-avatars.com/api/?name=${resultProfile.data.name}&background=E1F5FE&color=0D47A1&bold=true`;
                }

                // Load Alamat (Jika sudah ada)
                const resAddr = await fetch('/api/address', { headers: { 'Authorization': `Bearer ${token}` } });
                const resultAddr = await resAddr.json();
                
                if (resultAddr.success && resultAddr.data) {
                    document.getElementById('inputNama').value = resultAddr.data.nama_penerima;
                    document.getElementById('inputWA').value = resultAddr.data.nomor_wa;
                    
                    // Karena sistem lama tidak memisah kota/provinsi, kita letakkan sisanya di Detail
                    document.getElementById('inputDetail').value = resultAddr.data.alamat_lengkap;
                }
            } catch (err) {
                console.error("Gagal memuat data", err);
            }
        }
        loadProfile();

        // ==========================================
        // 3. SIMPAN ALAMAT (SIAP UNTUK CHECKOUT)
        // ==========================================
        document.getElementById('formProfil').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSimpan');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Menyimpan...';

            const nama = document.getElementById('inputNama').value;
            const wa = document.getElementById('inputWA').value;
            const detailJalan = document.getElementById('inputDetail').value;

            // Cek Dropdown
            if(!selectProvinsi.value || !selectKota.value) {
                showToast("Provinsi dan Kota Wajib Dipilih!", "error");
                btn.innerHTML = '<i class="fas fa-save mr-2"></i> SIMPAN ALAMAT';
                return;
            }

            // Gabungkan Format Alamat agar kompatibel dengan sistem Server yang lama
            // Format: "Jl. Mawar No 10, KOTA BANDUNG, JAWA BARAT"
            const alamatGabungan = `${detailJalan}, ${namaKotaTerpilih}, ${namaProvinsiTerpilih}`;

            try {
                const res = await fetch('/api/address', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ nama: nama, wa: wa, detail: alamatGabungan })
                });
                
                const data = await res.json();
                if (data.success) {
                    showToast("Alamat berhasil diperbarui! 🎉", "success");
                    // Lempar kembali ke checkout jika dia berasal dari sana
                    setTimeout(() => {
                        window.history.back(); // Kembali ke halaman sebelumnya
                    }, 1500);
                } else {
                    showToast(data.message, "error");
                }
            } catch (err) {
                showToast("Gagal terhubung ke server", "error");
            } finally {
                btn.innerHTML = '<i class="fas fa-save mr-2"></i> SIMPAN ALAMAT';
            }
        });

        // Logout
        document.getElementById('btnLogout').addEventListener('click', () => {
            localStorage.removeItem('token');
            showToast("Berhasil Logout", "success");
            setTimeout(() => window.location.href = '../dashboardutama.html', 1000);
        });
    </script>
</body>
</html>
