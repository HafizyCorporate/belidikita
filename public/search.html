<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pencarian Produk - Belidikita</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,600,800" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; }
        
        /* ✅ TEMA RAMADHAN HIJAU KHAS LEBARAN */
        body { 
            background: linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 100%); 
            color: #333; min-height: 100vh;
            background-image: radial-gradient(#A5D6A7 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* --- DEKORASI RAMADHAN MELAYANG --- */
        .ramadhan-decor { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .lantern {
            position: absolute; top: -10px; width: 35px; height: 50px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512"><path fill="%23FFD700" d="M112 0c-17.7 0-32 14.3-32 32v16h224V32c0-17.7-14.3-32-32-32H112zM0 96c0-17.7 14.3-32 32-32h320c17.7 0 32 14.3 32 32v64H0V96zm48 96h288v192c0 35.3-28.7 64-64 64H112c-35.3 0-64-28.7-64-64V192zm144 288c53 0 96 43 96 96H96c0-53 43-96 96-96z"/></svg>') no-repeat center center;
            transform-origin: top center; filter: drop-shadow(0px 5px 10px rgba(255, 215, 0, 0.4));
        }
        .lantern.left { left: 5%; animation: swing 3s ease-in-out infinite alternate; }
        .lantern.right { right: 80%; animation: swing 4s ease-in-out infinite alternate-reverse; width: 25px; height: 40px; }
        @keyframes swing { 0% { transform: rotate(10deg); } 100% { transform: rotate(-10deg); } }

        /* --- HEADER PENCARIAN AKTIF + IKON --- */
        .top-header-search { 
            position: fixed; top: 0; left: 0; width: 100%; height: 65px; 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 15px; z-index: 1000; box-shadow: 0 2px 10px rgba(0, 105, 92, 0.1); 
            border-bottom: 2px solid #A5D6A7; 
        }
        .top-header-search i.btn-back { font-size: 20px; color: #00695C; cursor: pointer; transition: 0.2s; }
        .top-header-search i.btn-back:active { transform: scale(0.8); }
        
        .search-bar-active { 
            flex: 1; margin: 0 15px; background: #f2fcf6; border: 2px solid #00AA5B; 
            border-radius: 20px; padding: 8px 15px; display: flex; align-items: center; 
        }
        .search-bar-active input { 
            border: none; background: transparent; outline: none; width: 100%; 
            font-size: 13px; font-weight: 700; color: #00695C; margin-left: 8px; 
        }
        
        .header-icons { display: flex; gap: 15px; align-items: center; }
        .header-icons i { font-size: 20px; color: #00695C; cursor: pointer; }
        .cart-wrapper { position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer;}
        .cart-badge-search { position: absolute; top: -5px; right: -8px; background: #ff3b30; color: #fff; font-size: 9px; font-weight: 800; padding: 2px 5px; border-radius: 10px; border: 2px solid #fff; box-shadow: 0 2px 5px rgba(255,59,48,0.5);}

        /* --- FILTER PENCARIAN --- */
        .filter-container-search {
            display: flex; gap: 8px; overflow-x: auto; padding: 10px 15px;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: fixed; top: 65px; left: 0; width: 100%; z-index: 999; scrollbar-width: none;
        }
        .filter-container-search::-webkit-scrollbar { display: none; }
        .filter-container-search select {
            padding: 8px 12px; border: 1px solid #A5D6A7; border-radius: 20px;
            font-size: 11px; font-weight: 800; color: #00695C; outline: none;
            background: #f2fcf6; cursor: pointer; white-space: nowrap; flex-shrink: 0;
            appearance: none; -webkit-appearance: none;
        }

        /* --- GRID PRODUK --- */
        .content-wrapper { position: relative; z-index: 10; max-width: 600px; margin: 120px auto 0 auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .search-title { font-size: 14px; font-weight: 800; color: #00695C; display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.8); padding: 10px 15px; border-radius: 12px; border: 1px dashed #A5D6A7;}
        
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding-bottom: 80px; }
        .product-card { background: rgba(255,255,255,0.9); border: 2px solid #E8F5E9; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; transition: transform 0.2s; position: relative;}
        .product-card:active { transform: scale(0.95); }
        .product-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-bottom: 2px solid #E8F5E9; cursor: pointer; }
        .product-info { padding: 12px; display: flex; flex-direction: column; flex-grow: 1; }
        .product-title { font-size: 12px; font-weight: 700; color: #00695C; margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; cursor: pointer;}
        .product-price { color: #FF9800; font-weight: 800; font-size: 15px; margin-bottom: 8px; }
        
        .p-store-link { font-size: 9px; color: #888; font-weight: 600; margin-top: 4px; display: flex; align-items: center; gap: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; border-top: 1px dashed #E8F5E9; padding-top: 8px; transition: 0.2s; }
        .p-store-link:hover { color: #00AA5B; }
        .p-sold-rating { display: flex; justify-content: space-between; font-size: 10px; color: #888; font-weight: 600; margin-top: 8px; }

        .empty-state { text-align: center; padding: 50px 20px; background: rgba(255,255,255,0.9); border-radius: 15px; border: 1px dashed #A5D6A7; grid-column: span 2; }
        .empty-state i { font-size: 60px; color: #ddd; margin-bottom: 15px; }
        .empty-state h3 { color: #ff3b30; font-weight: 800; font-size: 16px; margin-bottom: 5px; }
        .empty-state p { color: #888; font-size: 12px; font-weight: 600; }

        /* ✅ CSS NAVBAR BAWAH */
        nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: rgba(255,255,255,0.95); backdrop-filter: blur(15px); display: flex; justify-content: space-around; align-items: center; box-shadow: 0 -5px 25px rgba(0, 105, 92, 0.15); z-index: 1000; border-top: 1px solid #E8F5E9; border-radius: 20px 20px 0 0;}
        .nav-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #888; font-size: 10px; font-weight: 700; transition: 0.3s; position: relative; width: 60px;}
        .nav-item i { font-size: 20px; margin-bottom: 4px; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .nav-item.active { color: #00695C; }
        .nav-item.active i { transform: translateY(-5px) scale(1.1); color: #00AA5B; }
        .nav-item.active::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 6px; height: 6px; background: #00AA5B; border-radius: 50%; }
        .nav-item:active i { transform: scale(0.8); }

        /* TOAST */
        #customToast { visibility: hidden; min-width: 280px; margin-left: -140px; background: rgba(0, 105, 92, 0.95); backdrop-filter: blur(10px); color: #fff; text-align: center; border: 2px solid rgba(255,255,255,0.2); border-radius: 30px; padding: 16px 20px; position: fixed; z-index: 9999; left: 50%; bottom: -50px; font-size: 13px; font-weight: 800; box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; }
        #customToast.show { visibility: visible; opacity: 1; bottom: 90px; }
        #customToast.success { background: rgba(0, 170, 91, 0.95); border-color: #A5D6A7; }
        #customToast.error { background: rgba(255, 59, 48, 0.95); border-color: #FFCDD2; }
    </style>
</head>
<body>

    <div class="ramadhan-decor">
        <div class="lantern left"></div><div class="lantern right"></div>
    </div>

    <div class="top-header-search">
        <i class="fas fa-arrow-left btn-back" onclick="window.history.back()"></i>
        <div class="search-bar-active">
            <i class="fas fa-search" style="color: #00695C; font-size: 14px;" onclick="eksekusiPencarian()"></i>
            <input type="text" id="inputSearch" placeholder="Cari barang..." onkeypress="if(event.key === 'Enter') eksekusiPencarian()">
        </div>
        
        <div class="header-icons">
            <i class="fas fa-envelope" onclick="window.location.href='inbox.html'"></i>
            <div class="cart-wrapper" onclick="window.location.href='keranjang.html'">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-badge-search" id="badgeKeranjang">0</span>
            </div>
        </div>
    </div>

    <div class="filter-container-search">
        <select id="filterSort" onchange="terapkanFilter()">
            <option value="terbaru">🆕 Terbaru</option>
            <option value="termurah">🏷️ Termurah</option>
            <option value="terlaris">🔥 Terlaris</option>
        </select>
        <select id="filterToko" onchange="terapkanFilter()">
            <option value="">🏪 Semua Toko</option>
            <option value="official">✅ Official Store</option>
        </select>
        <select id="filterLokasi" onchange="terapkanFilter()">
            <option value="">📍 Semua Kota</option>
            <option value="Bandung">Bandung</option>
            <option value="Jakarta">Jakarta</option>
            <option value="Surabaya">Surabaya</option>
            <option value="Semarang">Semarang</option>
            <option value="Yogyakarta">Yogyakarta</option>
        </select>
    </div>

    <div class="content-wrapper">
        <div class="search-title" id="judulPencarian"><i class="fas fa-spinner fa-spin"></i> Memuat Etalase...</div>
        <div class="product-grid" id="gridHasil"></div>
    </div>

    <nav id="bottomNav">
        <a href="dashboardutama.html" class="nav-item">
            <i class="fas fa-mosque"></i><span>Beranda</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-play-circle"></i><span>Video</span>
        </a>
        <a href="dashboardutama.html?openPesanan=true" class="nav-item">
            <i class="fas fa-receipt"></i><span>Pesanan</span>
        </a>
        <a href="registrasi/profilpembeli.html" class="nav-item">
            <i class="fas fa-user"></i><span>Akun</span>
        </a>
    </nav>

    <div id="customToast"></div>

    <script>
        function showToast(msg, type = 'info') {
            const toast = document.getElementById("customToast");
            toast.innerText = msg;
            toast.className = type + " show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        const formatRp = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);

        // ✅ AMBIL SEMUA PARAMETER DARI URL (Kategori, Kata Kunci, Sort)
        const urlParams = new URLSearchParams(window.location.search);
        let kataKunci = urlParams.get('q');
        let paramKategori = urlParams.get('category');
        let paramSort = urlParams.get('sort');
        let paramLokasi = urlParams.get('lokasi');
        
        let dataSemuaProduk = []; // Menyimpan SELURUH data produk
        let namaTokoGlobal = "Belidikita Official";
        let kotaTokoGlobal = "Kota Bandung";

        // AMBIL DATA TOKO DARI LOCAL STORAGE 
        try {
            const storeData = JSON.parse(localStorage.getItem('belidikita_store_profile'));
            if (storeData && storeData.nama) namaTokoGlobal = storeData.nama;
            if (storeData && storeData.kota) kotaTokoGlobal = storeData.kota;
        } catch (e) {}

        // KETIKA HALAMAN DIMUAT
        document.addEventListener("DOMContentLoaded", () => {
            // Set input dan dropdown sesuai URL
            if (kataKunci) document.getElementById('inputSearch').value = kataKunci;
            if (paramSort) document.getElementById('filterSort').value = paramSort;
            if (paramLokasi) document.getElementById('filterLokasi').value = paramLokasi;
            
            updateBadge(); 
            ambilSemuaDataProduk(); 
        });

        // ✅ UPDATE BADGE KERANJANG
        async function updateBadge() {
            const token = localStorage.getItem('token');
            const badge = document.getElementById('badgeKeranjang');
            if(!badge) return;
            if(!token || token.startsWith('token-admin-')) { badge.innerText = "0"; return; }
            try {
                const res = await fetch('/api/cart', { headers: { 'Authorization': `Bearer ${token}` } });
                const result = await res.json();
                if(result.success) { badge.innerText = result.data.reduce((sum, item) => sum + item.qty, 0); }
            } catch(e) {}
        }

        // ✅ MESIN PENCARI SAPU JAGAT (AMBIL SEMUA, FILTER DI SINI)
        async function ambilSemuaDataProduk() {
            const grid = document.getElementById('gridHasil');
            const judul = document.getElementById('judulPencarian');
            
            // Set Judul Awal
            if(paramKategori && !kataKunci) {
                judul.innerHTML = `<i class="fas fa-tags"></i> Etalase ${paramKategori}`;
            } else if (kataKunci) {
                judul.innerHTML = `<i class="fas fa-search"></i> Hasil untuk: "${kataKunci}"`;
            } else {
                judul.innerHTML = `<i class="fas fa-box-open"></i> Menampilkan Semua Produk`;
            }

            grid.innerHTML = '<div style="text-align:center; grid-column:span 2; padding:30px; color:#00695C; font-weight:bold;"><i class="fas fa-spinner fa-spin fa-2x"></i></div>';

            try {
                // Tarik SELURUH data produk (limit dibesarkan agar semua dapet)
                const res = await fetch('/api/products?limit=500');
                const result = await res.json();

                if(result.success && result.data.length > 0) {
                    dataSemuaProduk = result.data; 
                    terapkanFilter(); // Jalankan filter
                } else {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-box-open"></i>
                            <h3>Toko Masih Kosong 🥺</h3>
                            <p>Belum ada produk yang dijual saat ini.</p>
                        </div>
                    `;
                }
            } catch(e) {
                grid.innerHTML = '<div class="empty-state"><p style="color:red;">Gagal terhubung ke Server Belidikita.</p></div>';
            }
        }

        // ✅ LOGIKA FILTERING SUPER AKURAT
        window.terapkanFilter = function() {
            const grid = document.getElementById('gridHasil');
            const sort = document.getElementById('filterSort').value;
            const toko = document.getElementById('filterToko').value;
            const lokasi = document.getElementById('filterLokasi').value;

            // 1. Mulai dari semua data
            let filteredData = [...dataSemuaProduk];

            // 2. Filter Kategori (Jika dari klik Kategori/Sub)
            if(paramKategori) {
                filteredData = filteredData.filter(p => {
                    let cat = (p.category || "").toLowerCase();
                    return cat.includes(paramKategori.toLowerCase());
                });
            }

            // 3. Filter Kata Kunci (Bisa mendeteksi judul, kategori, dan deskripsi)
            if(kataKunci) {
                let kw = kataKunci.toLowerCase();
                filteredData = filteredData.filter(p => {
                    let title = (p.title || "").toLowerCase();
                    let cat = (p.category || "").toLowerCase();
                    let desc = (p.description || "").toLowerCase();
                    return title.includes(kw) || cat.includes(kw) || desc.includes(kw);
                });
            }
            
            // 4. Filter Lokasi
            if(lokasi !== '') {
                if(!kotaTokoGlobal.toLowerCase().includes(lokasi.toLowerCase())) {
                    filteredData = []; // Kosongkan jika lokasi toko tidak cocok dengan dropdown
                }
            }

            // 5. Sortir (Urutkan)
            if(sort === 'termurah') {
                filteredData.sort((a, b) => parseFloat(a.price) - parseFloat(b.price));
            } else if(sort === 'terlaris') {
                filteredData.sort((a, b) => (parseInt(b.sold_count) || 0) - (parseInt(a.sold_count) || 0));
            } else {
                // Terbaru (Default ID terbesar)
                filteredData.sort((a, b) => parseInt(b.id) - parseInt(a.id));
            }

            // 6. RENDER KE LAYAR
            grid.innerHTML = '';
            if(filteredData.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-filter" style="color:#FF9800; font-size:40px;"></i>
                        <h3 style="color:#FF9800; margin-top:10px;">Barang Gak Ketemu Nih</h3>
                        <p>Coba gunakan kata kunci yang lebih umum.</p>
                    </div>
                `;
                return;
            }

            filteredData.forEach(p => {
                let arrFoto = [];
                try { arrFoto = JSON.parse(p.media_url); if (!Array.isArray(arrFoto)) arrFoto = [p.media_url];} catch(e) { arrFoto = [p.media_url]; }
                const imgUrl = arrFoto[0] || 'https://via.placeholder.com/150';
                const hargaRp = formatRp(p.price);
                const terjualReal = p.sold_count || 0; 
                const ratingReal = parseFloat(p.avg_rating) || 0;
                const tampilanRating = ratingReal > 0 ? ratingReal.toFixed(1) : "0.0";

                const htmlLokasiToko = `
                    <div class="p-store-link" onclick="event.stopPropagation(); window.location.href='toko.html'">
                        <i class="fas fa-map-marker-alt" style="color: #00AA5B;"></i> ${kotaTokoGlobal} | <i class="fas fa-check-circle" style="color: #00695C;"></i> ${namaTokoGlobal} <i class="fas fa-chevron-right" style="margin-left:auto; font-size:8px;"></i>
                    </div>
                `;

                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${imgUrl}" alt="Produk" loading="lazy" onclick="window.location.href='detailproduk.html?id=${p.id}'">
                        <div class="product-info">
                            <h3 class="product-title" onclick="window.location.href='detailproduk.html?id=${p.id}'">${p.title}</h3>
                            <div class="product-price" onclick="window.location.href='detailproduk.html?id=${p.id}'">${hargaRp}</div>
                            ${htmlLokasiToko}
                            <div class="p-sold-rating">
                                <span><i class="fas fa-star" style="color:#FFD700;"></i> ${tampilanRating}</span>
                                <span>${terjualReal} Terjual</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // ✅ FUNGSI SAAT TOMBOL ENTER DIKTEKAN DI KOTAK PENCARIAN
        function eksekusiPencarian() {
            const val = document.getElementById('inputSearch').value.trim();
            if(val) {
                // Update variabel global
                kataKunci = val;
                paramKategori = null; // Reset kategori jika mencari manual
                
                // Ubah URL secara diam-diam agar rapi dan bisa di-back
                window.history.pushState({}, '', `search.html?q=${encodeURIComponent(val)}`);
                
                // Update Judul
                document.getElementById('judulPencarian').innerHTML = `<i class="fas fa-search"></i> Hasil untuk: "${val}"`;
                
                // Terapkan filter ulang
                terapkanFilter();
            }
        }
    </script>
</body>
</html>
