<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Keranjang - Belidikita</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,600,800" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        body { background-color: #f4f7fa; color: #333; padding-bottom: 90px; }

        .header { background: #fff; padding: 15px; display: flex; align-items: center; gap: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; }
        .header i { font-size: 20px; color: #0D47A1; cursor: pointer; }
        .header h2 { font-size: 16px; font-weight: 800; color: #333; }

        .cart-container { padding: 15px; }

        .cart-item { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; gap: 15px; position: relative; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity:0; transform:translateY(10px);} to {opacity:1; transform:translateY(0);} }

        .cart-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid #eee; }
        
        .item-info { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .item-info h4 { font-size: 13px; font-weight: 700; color: #333; margin-bottom: 5px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .item-price { color: #ff5722; font-weight: 800; font-size: 14px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap;}
        
        /* ✅ Label Info Grosir di Keranjang */
        .grosir-badge { font-size: 9px; background: #E8F5E9; color: #00AA5B; padding: 2px 5px; border-radius: 4px; border: 1px solid #C8E6C9; margin-top: 2px; display: inline-block; font-weight: bold;}
        .harga-coret { text-decoration: line-through; color: #aaa; font-size: 10px; font-weight: 600; }

        .item-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .qty-control { display: flex; align-items: center; border: 1px solid #ddd; border-radius: 6px; overflow: hidden; }
        .qty-btn { width: 30px; height: 30px; background: #f4f7fa; border: none; font-size: 16px; font-weight: bold; color: #0D47A1; cursor: pointer; }
        .qty-btn:active { background: #E1F5FE; }
        .qty-input { width: 40px; height: 30px; text-align: center; border: none; border-left: 1px solid #ddd; border-right: 1px solid #ddd; font-size: 13px; font-weight: 800; outline: none; background: #fff;}
        
        .btn-delete { color: #ff3b30; background: none; border: none; font-size: 18px; cursor: pointer; padding: 5px; }

        .empty-cart { text-align: center; padding: 50px 20px; }
        .empty-cart i { font-size: 60px; color: #ccc; margin-bottom: 15px; }
        .empty-cart p { color: #888; font-size: 14px; font-weight: 600; margin-bottom: 20px; }
        .btn-shop { background: #0D47A1; color: #fff; padding: 12px 25px; border-radius: 25px; text-decoration: none; font-weight: 800; font-size: 13px; display: inline-block; }

        .bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }
        .total-box { display: flex; flex-direction: column; }
        .total-box span { font-size: 11px; color: #666; font-weight: 600; }
        .total-box strong { font-size: 18px; color: #ff5722; font-weight: 800; }
        
        .btn-checkout { background: linear-gradient(135deg, #00AA5B, #00c853); color: #fff; border: none; padding: 12px 30px; border-radius: 12px; font-weight: 800; font-size: 14px; cursor: pointer; box-shadow: 0 4px 10px rgba(0, 170, 91, 0.3); transition: 0.2s;}
        .btn-checkout:active { transform: scale(0.95); }
        .btn-checkout:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-arrow-left" onclick="history.back()"></i>
        <h2>Keranjang Belanja</h2>
    </div>

    <div class="cart-container" id="cartList">
        </div>

    <div class="bottom-bar">
        <div class="total-box">
            <span>Total Harga:</span>
            <strong id="totalHarga">Rp0</strong>
        </div>
        <button class="btn-checkout" id="btnCheckout" onclick="lanjutCheckout()">Checkout (<span id="totalItem">0</span>)</button>
    </div>

    <script>
                const formatRp = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
        
        let globalCartData = []; // Menyimpan data dari server sementara untuk dipakai di checkout

        async function loadCart() {
            const token = localStorage.getItem('token');
            const container = document.getElementById('cartList');
            const btnCheckout = document.getElementById('btnCheckout');
            
            if (!token || token.startsWith('token-admin-')) {
                window.location.href = 'dashboardutama.html';
                return;
            }

            container.innerHTML = '<p style="text-align:center; padding:30px;"><i class="fas fa-spinner fa-spin mr-2"></i> Memuat keranjang...</p>';

            try {
                const res = await fetch('/api/cart', { headers: { 'Authorization': `Bearer ${token}` } });
                const result = await res.json();

                if (!result.success || result.data.length === 0) {
                    container.innerHTML = `
                        <div class="empty-cart">
                            <i class="fas fa-shopping-basket"></i>
                            <p>Keranjang masih kosong nih.<br>Yuk cari barang buat persiapan Ramadhan!</p>
                            <a href="dashboardutama.html" class="btn-shop">Belanja Sekarang</a>
                        </div>
                    `;
                    document.getElementById('totalHarga').innerText = "Rp0";
                    document.getElementById('totalItem').innerText = "0";
                    btnCheckout.disabled = true;
                    return;
                }

                globalCartData = result.data;
                let totalBiaya = 0;
                let totalBarang = 0;
                container.innerHTML = '';

                globalCartData.forEach((item) => {
                    // Mencegah array gambar dari database pecah
                    let fotoUtama = item.media_url;
                    try { const parsedMedia = JSON.parse(item.media_url); if (Array.isArray(parsedMedia) && parsedMedia.length > 0) fotoUtama = parsedMedia[0]; } catch(e) {} 
                    
                    // Nama varian digabungkan jika ada
                    const namaVarianTeks = item.variant ? ` (${item.variant})` : '';
                    const namaTampil = `${item.title}${namaVarianTeks}`;

                    // LOGIKA GROSIR ASLI
                    let hargaFinal = parseFloat(item.price);
                    let infoGrosirHTML = '';

                    if (item.wholesale_price > 0 && item.wholesale_min_qty > 0) {
                        if (item.qty >= item.wholesale_min_qty) {
                            hargaFinal = parseFloat(item.wholesale_price); 
                            infoGrosirHTML = `<div class="grosir-badge"><i class="fas fa-tags"></i> Harga Grosir Aktif!</div>`;
                        } else {
                            let kurangBerapa = item.wholesale_min_qty - item.qty;
                            infoGrosirHTML = `<div style="font-size:9px; color:#888; margin-top:2px;">Tambah ${kurangBerapa} lg dpt Harga Grosir: ${formatRp(item.wholesale_price)}</div>`;
                        }
                    }

                    totalBiaya += (hargaFinal * item.qty);
                    totalBarang += item.qty;

                    const tampilanHargaCorek = (hargaFinal < parseFloat(item.price)) ? `<span class="harga-coret">${formatRp(item.price)}</span>` : '';

                    container.innerHTML += `
                        <div class="cart-item">
                            <img src="${fotoUtama}" alt="${namaTampil}">
                            <div class="item-info">
                                <h4>${namaTampil}</h4>
                                <div class="item-price">${formatRp(hargaFinal)} ${tampilanHargaCorek}</div>
                                ${infoGrosirHTML}
                                <div class="item-actions">
                                    <div class="qty-control">
                                        <button class="qty-btn" onclick="ubahQtyDb(${item.cart_id}, ${item.product_id}, '${item.variant}', -1)">-</button>
                                        <input type="text" class="qty-input" value="${item.qty}" readonly>
                                        <button class="qty-btn" onclick="ubahQtyDb(${item.cart_id}, ${item.product_id}, '${item.variant}', 1)">+</button>
                                    </div>
                                    <button class="btn-delete" onclick="hapusItemDb(${item.cart_id})"><i class="fas fa-trash-alt"></i></button>
                                </div>
                            </div>
                        </div>
                    `;
                });

                document.getElementById('totalHarga').innerText = formatRp(totalBiaya);
                document.getElementById('totalItem').innerText = totalBarang;
                btnCheckout.disabled = false;

            } catch (err) {
                container.innerHTML = '<p style="text-align:center; padding:30px; color:red;">Gagal terhubung ke server.</p>';
            }
        }

        // ✅ LOGIKA BARU: UPDATE QTY LANGSUNG KE DATABASE
        async function ubahQtyDb(cartId, productId, variant, perubahan) {
            const token = localStorage.getItem('token');
            const targetItem = globalCartData.find(c => c.cart_id === cartId);
            if(!targetItem) return;

            let qtyBaru = targetItem.qty + perubahan;
            if (qtyBaru <= 0) { hapusItemDb(cartId); return; }

            try {
                // Endpoint POST di keranjang kita sudah bergaya Upsert (Bisa update jika barang ada)
                await fetch('/api/cart', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ product_id: productId, variant: variant, qty: perubahan }) // Kirim selisih perubahannya (+1 atau -1)
                });
                loadCart(); // Refresh layar keranjang
            } catch(e) {}
        }

        // ✅ LOGIKA BARU: HAPUS ITEM LANGSUNG DARI DATABASE
        async function hapusItemDb(cartId) {
            const token = localStorage.getItem('token');
            try {
                await fetch(`/api/cart/${cartId}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
                loadCart();
            } catch(e) {}
        }

        // ✅ LOGIKA BARU: PINDAHKAN KERANJANG KE CHECKOUT_SESSIONS DATABASE
        async function lanjutCheckout() {
            if (globalCartData.length === 0) return;
            const token = localStorage.getItem('token');
            const btnCheckout = document.getElementById('btnCheckout');
            btnCheckout.innerText = "Memproses..."; btnCheckout.disabled = true;

            // Format ulang data keranjang agar strukturnya sama dengan yang biasa masuk ke checkout
            const dataCheckout = globalCartData.map(item => {
                let fotoUtama = item.media_url;
                try { const parsedMedia = JSON.parse(item.media_url); if (Array.isArray(parsedMedia) && parsedMedia.length > 0) fotoUtama = parsedMedia[0]; } catch(e) {} 
                const namaVarianTeks = item.variant ? ` (${item.variant})` : '';
                return {
                    id: item.product_id,
                    foto: fotoUtama, 
                    nama: `${item.title}${namaVarianTeks}`,
                    harga: parseFloat(item.price),
                    qty: item.qty,
                    weight: item.weight || 1000,
                    wholesale_price: parseFloat(item.wholesale_price) || 0, 
                    wholesale_min_qty: item.wholesale_min_qty || 0
                };
            });

            try {
                const res = await fetch('/api/checkout-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ items_json: JSON.stringify(dataCheckout) })
                });
                const result = await res.json();
                if(result.success) { window.location.href = 'checkout.html'; } 
                else { alert("Gagal memproses checkout."); btnCheckout.innerText = "Checkout"; btnCheckout.disabled = false; }
            } catch(e) { alert("Error koneksi."); btnCheckout.innerText = "Checkout"; btnCheckout.disabled = false; }
        }

        loadCart();

    </script>
</body>
</html>
